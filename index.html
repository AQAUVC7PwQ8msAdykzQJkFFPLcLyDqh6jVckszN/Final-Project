<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fingerprinting Demo Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      width: min(700px, 92vw);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      color: #38bdf8;
    }

    p {
      color: #94a3b8;
      margin-bottom: 24px;
    }

    .btn-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a.btn {
      display: inline-block;
      text-decoration: none;
      background: #38bdf8;
      color: #0f172a;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    a.btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Fingerprinting Project Hub</h1>
    <p>Select a page to view the live demo or the code snippet.</p>
    <div class="btn-row">
      <a class="btn" href="/Demo/Demo.html">Open Demo</a>
      <a class="btn" href="/Code Snippet/Code Snippet.html">View Code Snippet</a>
    </div>
  </main>
</body>
</html>
